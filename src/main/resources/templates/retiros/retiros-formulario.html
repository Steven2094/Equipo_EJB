<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retiros — Formulario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a th:href="@{/retiros}"><img src="https://i.ibb.co/Dfdqjxts/logo-retiros.png" alt="logo-retiros" border="0" height="90"/></a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" th:href="@{/retiros/impresion}">Versión para imprimir</a>
        <a class="btn btn-outline-secondary" th:href="@{/retiros/creditos}">Créditos</a>
        <a class="btn btn-outline-secondary" th:href="@{/retiros}">Volver</a>
      </div>
    </div>
  </nav>

  <header class="py-4 page-hero">
    <div class="container">
      <div class="pill">Crear / Actualizar</div>
      <h1 class="h3 fw-bold mt-2 mb-1" th:text="${resource.id} != null ? 'Editar retiro' : 'Nuevo retiro'">Nuevo retiro</h1>
      <div class="text-muted">Formulario para registrar nuevas reservaciones</div>
    </div>
  </header>

  <main class="container pb-5"> 
    <div class="row g-3">
      <div class="col-lg-12">
        <div class="card shadow-sm">
          <div class="card-body">

            <form th:object="${resource}"
                  th:action="${resource.id} != null ? @{/retiros/{id}(id=${resource.id})} : @{/retiros}"
                  method="post">

              <div class="mb-3">
                <label class="form-label">Nombre del que reserva</label>
                <input class="form-control form-control-lg" th:field="*{nombre}" placeholder="Ej: Juan Pérez" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Edad</label>
                <input class="form-control" type="number" th:field="*{edad}" min="1" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input class="form-control" type="tel" th:field="*{telefono}" placeholder="Ej: 555123456" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input class="form-control" type="email" th:field="*{correo}" placeholder="ejemplo@correo.com" required />
              </div>

              <div class="row g-2">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">Fecha de ingreso</label>
                    <input class="form-control" type="date" th:field="*{fechaIngreso}" required />
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">Fecha de salida</label>
                    <input class="form-control" type="date" th:field="*{fechaSalida}" required />
                  </div>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Número de acompañantes</label>
                <input class="form-control" type="number" th:field="*{acompanantes}" min="0" required />
              </div>

              <!-- Botones únicos -->
              <div class="d-flex gap-2">
                <button class="btn-primary-2" type="submit">Guardar</button>
                <a class="btn btn-outline-secondary" th:href="@{/retiros}">Cancelar</a>
              </div>

            </form>
          </div>
        </div>
      </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
