<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retiros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>

  <body>
  <header class="bg-light shadow-sm mb-4">
    <div class="container py-3">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
        <h1 class="h3 m-0">Retiros</h1>
        </div>
    </div>
    </header>
    <main class="container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
            <div class="fw-semibold">Registros</div>
            <div class="text-muted
                small" th:text="'Total: ' + ${#lists.size(resources)}">Total: 0</div>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="width: 90px">ID</th>
                        <th>Nombre</th>
                        <th style="width: 100px">Edad</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th style="width: 140px">Fecha ingreso</th>
                        <th style="width: 140px">Fecha salida</th>
                        <th style="width: 160px">Acompañantes</th>
                        <th style="width: 220px" class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(resources)}">
                        <td colspan="9" class="text-muted">Aún no hay reservaciones. Crea la primera.</td>
                    </tr>
                    <tr th:each="r : ${resources}">
                        <td class="text-muted" th:text="${r.id}">1</td>
                        <td class="fw-semibold" th:text="${r.nombre}">Juan Pérez</td>
                        <td th:text="${r.edad}">30</td>
                        <td th:text="${r.telefono}">555123456</td>
                        <td th:text="${r.correo}">ejemplo@correo.com</td>
                        <td th:text="${r.fechaIngreso}">2026-03-01</td>
                        <td th:text="${r.fechaSalida}">2026-03-05</td>
                        <td th:text="${r.acompanantes}">2</td>
                        <td class="text-end">
                    </tr>
                    </tbody>
                </table>    
            </div>
        </div>
        </div>
    </main>
    <script src="/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
